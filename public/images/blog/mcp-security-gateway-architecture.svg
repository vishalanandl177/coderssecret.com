    <text x="1025" y="291" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#e0f2fe">Databases</text>

    <rect x="930" y="359" width="190" height="82" rx="18" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="1025" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#e0f2fe">Internal APIs</text>
