<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#083344"/>
    </linearGradient>
    <linearGradient id="line" x1="112" y1="315" x2="1088" y2="315" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 100 H1200 M0 220 H1200 M0 340 H1200 M0 460 H1200 M0 580 H1200 M120 0 V630 M300 0 V630 M480 0 V630 M660 0 V630 M840 0 V630 M1020 0 V630" stroke="#ffffff" stroke-opacity="0.055"/>
  <circle cx="1015" cy="130" r="190" fill="#22d3ee" fill-opacity="0.08"/>
  <circle cx="270" cy="530" r="220" fill="#a78bfa" fill-opacity="0.08"/>

  <text x="80" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="850" fill="#ffffff">Production MCP Security Architecture</text>
  <text x="82" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#cbd5e1">Use a gateway to enforce identity, policy, egress, audit, and least-privilege tool access.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="205" width="170" height="130" rx="22" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <text x="165" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#e0f2fe">AI Client</text>
    <text x="165" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">agent host</text>
    <text x="165" y="307" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">MCP client</text>

    <rect x="345" y="172" width="205" height="196" rx="28" fill="#1e1b4b" stroke="#a78bfa" stroke-width="3"/>
    <text x="448" y="232" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="25" font-weight="850" fill="#ede9fe">MCP Gateway</text>
    <text x="448" y="269" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ddd6fe">auth validation</text>
    <text x="448" y="292" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ddd6fe">policy decisions</text>
    <text x="448" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ddd6fe">audit + rate limits</text>

    <rect x="650" y="156" width="180" height="88" rx="20" fill="#052e16" stroke="#34d399" stroke-width="2"/>
    <text x="740" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="800" fill="#dcfce7">Approved</text>
    <text x="740" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="800" fill="#dcfce7">MCP Servers</text>

    <rect x="650" y="292" width="180" height="88" rx="20" fill="#451a03" stroke="#fb923c" stroke-width="2"/>
    <text x="740" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffedd5">Sandboxed</text>
    <text x="740" y="353" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffedd5">Local Tools</text>

