  <path d="M250 270 H345" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M550 270 H610 C635 270 630 200 650 200" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M550 270 H610 C635 270 630 336 650 336" stroke="url(#line)" stroke-width="5" stroke-linecap="round"/>
  <path d="M830 200 H880 C905 200 905 166 930 166" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M830 200 H880 C905 200 905 283 930 283" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M830 336 H880 C905 336 905 400 930 400" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>

  <g>
    <rect x="300" y="430" width="610" height="96" rx="22" fill="#020617" stroke="#475569" stroke-width="1.5"/>
    <text x="605" y="464" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Gateway responsibilities</text>
    <text x="350" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">token audience checks</text>
    <text x="535" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">tool allowlists</text>
    <text x="670" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">egress policy</text>
    <text x="800" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#cbd5e1">audit logs</text>
  </g>

  <text x="80" y="585" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8">coderssecret.com</text>
