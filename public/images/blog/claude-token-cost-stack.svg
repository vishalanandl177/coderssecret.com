<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Claude token cost stack</title>
  <desc id="desc">A layered diagram showing Claude token costs across API input, tool context, Claude Code project context, thinking tokens, and output tokens.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.45" stop-color="#1f1633"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" rx="32" fill="url(#bg)"/>
  <circle cx="1020" cy="115" r="130" fill="#7c3aed" opacity="0.22" filter="url(#soft)"/>
  <circle cx="210" cy="520" r="150" fill="#ec4899" opacity="0.14" filter="url(#soft)"/>
  <text x="70" y="86" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Claude Token Cost Stack</text>
  <text x="72" y="124" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="20">What is billed depends on whether you use the API, Claude Code, tools, caching, and thinking.</text>

  <rect x="70" y="170" width="1060" height="330" rx="24" fill="#020617" opacity="0.54" stroke="#334155"/>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="110" y="405" width="980" height="58" rx="16" fill="#3b82f6"/>
    <text x="140" y="442" fill="#ffffff" font-size="20" font-weight="800">Visible answer output</text>
    <text x="930" y="442" fill="#dbeafe" font-size="18" text-anchor="end">output tokens</text>

    <rect x="110" y="338" width="850" height="58" rx="16" fill="#ef4444"/>
    <text x="140" y="375" fill="#ffffff" font-size="20" font-weight="800">Thinking / adaptive reasoning</text>
    <text x="800" y="375" fill="#fee2e2" font-size="18" text-anchor="end">billed as output</text>

    <rect x="110" y="271" width="740" height="58" rx="16" fill="#a855f7"/>
    <text x="140" y="308" fill="#ffffff" font-size="20" font-weight="800">Conversation history and tool results</text>
    <text x="700" y="308" fill="#f3e8ff" font-size="18" text-anchor="end">input tokens</text>

    <rect x="110" y="204" width="610" height="58" rx="16" fill="#f97316"/>
    <text x="140" y="241" fill="#ffffff" font-size="20" font-weight="800">Tools, MCP, CLAUDE.md, instructions</text>
    <text x="575" y="241" fill="#ffedd5" font-size="18" text-anchor="end">input context</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="17" fill="#e2e8f0">
    <rect x="70" y="530" width="320" height="52" rx="16" fill="#111827" stroke="#475569"/>
    <text x="92" y="563">Cache reads cut price, not context size</text>
    <rect x="440" y="530" width="310" height="52" rx="16" fill="#111827" stroke="#475569"/>
    <text x="462" y="563">Batch API can cut token cost by 50%</text>
    <rect x="800" y="530" width="330" height="52" rx="16" fill="#111827" stroke="#475569"/>
    <text x="822" y="563">Model choice changes every calculation</text>
  </g>
  <rect x="70" y="600" width="1060" height="6" rx="3" fill="url(#accent)"/>
</svg>
