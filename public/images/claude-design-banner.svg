<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#e8c9a0"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#c4956a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="600" y1="0" x2="600" y2="480"/>
    <line x1="800" y1="0" x2="800" y2="480"/>
    <line x1="1000" y1="0" x2="1000" y2="480"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="950" cy="90" r="120" fill="#d4a574" opacity="0.06"/>
  <circle cx="1050" cy="380" r="80" fill="#7c3aed" opacity="0.06"/>
  <circle cx="100" cy="400" r="60" fill="#3b82f6" opacity="0.05"/>

  <!-- Left side: Text content -->
  <g>
    <!-- Anthropic Labs badge -->
    <rect x="80" y="100" width="160" height="28" rx="14" fill="url(#accent)" opacity="0.15"/>
    <text x="110" y="119" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#d4a574" letter-spacing="1.5">ANTHROPIC LABS</text>

    <!-- Title -->
    <text x="80" y="180" font-family="system-ui, sans-serif" font-size="48" font-weight="800" fill="#ffffff">Claude</text>
    <text x="280" y="180" font-family="system-ui, sans-serif" font-size="48" font-weight="800" fill="url(#accent)">Design</text>

    <!-- Subtitle -->
    <text x="80" y="220" font-family="system-ui, sans-serif" font-size="18" fill="#a0aec0">AI-powered design tool for prototypes,</text>
    <text x="80" y="245" font-family="system-ui, sans-serif" font-size="18" fill="#a0aec0">pitch decks, and visual experiences</text>

    <!-- Feature pills -->
    <rect x="80" y="280" width="110" height="30" rx="15" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="105" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#d4a574" font-weight="600">Prototypes</text>

    <rect x="200" y="280" width="110" height="30" rx="15" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="220" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#d4a574" font-weight="600">Pitch Decks</text>

    <rect x="320" y="280" width="100" height="30" rx="15" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="340" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#d4a574" font-weight="600">Slide Decks</text>

    <rect x="430" y="280" width="120" height="30" rx="15" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="448" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#d4a574" font-weight="600">Code Handoff</text>

    <!-- Powered by badge -->
    <text x="80" y="360" font-family="system-ui, sans-serif" font-size="13" fill="#718096">Powered by Claude Opus 4.7</text>
    <text x="80" y="380" font-family="system-ui, sans-serif" font-size="13" fill="#718096">Released April 17, 2026</text>
  </g>

  <!-- Right side: Design mockup -->
  <g transform="translate(660, 70)">
    <!-- Browser window -->
    <rect width="460" height="340" rx="12" fill="#1e2a3a" stroke="#ffffff" stroke-opacity="0.1"/>
    <!-- Title bar -->
    <rect width="460" height="36" rx="12" fill="#243447"/>
    <rect y="24" width="460" height="12" fill="#243447"/>
    <circle cx="20" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="18" r="5" fill="#febc2e"/>
    <circle cx="56" cy="18" r="5" fill="#28c840"/>
    <rect x="120" y="10" width="220" height="16" rx="8" fill="#1a2535"/>
    <text x="175" y="22" font-family="monospace" font-size="9" fill="#718096">claude.ai/design</text>

    <!-- Chat panel (left) -->
    <rect x="12" y="46" width="180" height="282" rx="8" fill="#151f2e"/>
    <!-- Chat messages -->
    <rect x="22" y="60" width="120" height="24" rx="6" fill="#d4a574" opacity="0.15"/>
    <text x="32" y="76" font-family="system-ui, sans-serif" font-size="9" fill="#d4a574">Design a landing</text>
    <rect x="22" y="94" width="155" height="40" rx="6" fill="#1e2a3a"/>
    <text x="32" y="110" font-family="system-ui, sans-serif" font-size="8" fill="#a0aec0">I'll create a modern</text>
    <text x="32" y="122" font-family="system-ui, sans-serif" font-size="8" fill="#a0aec0">landing page for you...</text>
    <rect x="22" y="146" width="100" height="24" rx="6" fill="#d4a574" opacity="0.15"/>
    <text x="32" y="162" font-family="system-ui, sans-serif" font-size="9" fill="#d4a574">More contrast</text>
    <!-- Input field -->
    <rect x="22" y="296" width="155" height="24" rx="6" fill="#1e2a3a" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="32" y="312" font-family="system-ui, sans-serif" font-size="9" fill="#4a5568">Type a message...</text>

    <!-- Canvas panel (right) -->
    <rect x="200" y="46" width="248" height="282" rx="8" fill="#0d1520"/>
    <!-- Mock design on canvas -->
    <rect x="220" y="66" width="208" height="24" rx="4" fill="url(#btn)" opacity="0.8"/>
    <text x="275" y="82" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e" font-weight="700">Hero Section</text>
    <rect x="220" y="100" width="208" height="60" rx="6" fill="#1a2535" stroke="#d4a574" stroke-opacity="0.2"/>
    <rect x="232" y="112" width="100" height="8" rx="2" fill="#ffffff" opacity="0.3"/>
    <rect x="232" y="126" width="160" height="6" rx="2" fill="#ffffff" opacity="0.12"/>
    <rect x="232" y="138" width="80" height="6" rx="2" fill="#ffffff" opacity="0.12"/>
    <!-- Cards row -->
    <rect x="220" y="170" width="64" height="50" rx="4" fill="#1a2535" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="292" y="170" width="64" height="50" rx="4" fill="#1a2535" stroke="#ffffff" stroke-opacity="0.06"/>
    <rect x="364" y="170" width="64" height="50" rx="4" fill="#1a2535" stroke="#ffffff" stroke-opacity="0.06"/>
    <!-- CTA button -->
    <rect x="270" y="236" width="108" height="28" rx="14" fill="url(#btn)"/>
    <text x="293" y="254" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a2e" font-weight="700">Get Started</text>
    <!-- Footer -->
    <rect x="220" y="274" width="208" height="40" rx="4" fill="#1a2535" opacity="0.5"/>
    <rect x="232" y="284" width="60" height="4" rx="1" fill="#ffffff" opacity="0.1"/>
    <rect x="302" y="284" width="40" height="4" rx="1" fill="#ffffff" opacity="0.1"/>
    <rect x="352" y="284" width="50" height="4" rx="1" fill="#ffffff" opacity="0.1"/>
  </g>

  <!-- Bottom bar -->
  <rect y="460" width="1200" height="20" fill="#d4a574" opacity="0.08"/>
  <rect y="460" width="400" height="20" fill="url(#accent)" opacity="0.15"/>
</svg>
