<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Are DAGs Dying? The Rise of Declarative Data Pipelines</title>
  <desc id="desc">A visual comparison of a task DAG and an asset graph for declarative data pipelines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.48" stop-color="#0f3f46"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="0.55" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
      <path d="M 42 0 L 0 0 0 42" stroke="#ffffff" stroke-width="0.65" opacity="0.07"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <circle cx="1035" cy="104" r="150" fill="#22c55e" opacity="0.08"/>
  <circle cx="1040" cy="395" r="175" fill="#38bdf8" opacity="0.07"/>
  <circle cx="606" cy="62" r="128" fill="#fb923c" opacity="0.07"/>

  <rect x="80" y="78" width="102" height="30" rx="15" fill="#fb923c" opacity="0.18"/>
  <text x="104" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#fdba74" letter-spacing="2">DEVOPS</text>

  <text x="80" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="850" fill="#ffffff">Are DAGs Dying?</text>
  <text x="80" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#ffffff">The Rise of Declarative</text>
  <text x="80" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#ffffff">Data Pipelines</text>
  <text x="80" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#cbd5e1">From task-first orchestration to asset graphs, contracts, and freshness policies</text>

  <g transform="translate(80 356)">
    <rect width="96" height="28" rx="14" fill="#ffffff" opacity="0.09"/>
    <text x="48" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#e2e8f0">DAGs</text>
    <rect x="110" width="126" height="28" rx="14" fill="#ffffff" opacity="0.09"/>
    <text x="173" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#e2e8f0">Asset Graphs</text>
    <rect x="250" width="142" height="28" rx="14" fill="#ffffff" opacity="0.09"/>
    <text x="321" y="19" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="800" fill="#e2e8f0">Data Contracts</text>
  </g>

  <g transform="translate(660 82)" filter="url(#softShadow)">
    <rect x="0" y="0" width="430" height="318" rx="22" fill="#0f172a" stroke="#334155"/>
    <text x="118" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800" fill="#fdba74">TASK DAG</text>
    <text x="315" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="800" fill="#86efac">ASSET GRAPH</text>

    <g stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#arrow)" opacity="0.92">
      <path d="M58 92 L116 92"/>
      <path d="M116 92 L174 136"/>
      <path d="M116 184 L174 136"/>
      <path d="M58 184 L116 184"/>
      <path d="M244 116 L306 116"/>
      <path d="M244 204 L306 204"/>
      <path d="M306 116 C336 116 342 160 372 160"/>
      <path d="M306 204 C336 204 342 160 372 160"/>
    </g>

    <g font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="800" text-anchor="middle">
      <rect x="34" y="74" width="52" height="36" rx="8" fill="#7c2d12" stroke="#fb923c"/>
      <text x="60" y="96" fill="#fed7aa">extract</text>
      <rect x="100" y="74" width="52" height="36" rx="8" fill="#7c2d12" stroke="#fb923c"/>
      <text x="126" y="96" fill="#fed7aa">clean</text>
      <rect x="100" y="166" width="52" height="36" rx="8" fill="#7c2d12" stroke="#fb923c"/>
      <text x="126" y="188" fill="#fed7aa">join</text>
      <rect x="34" y="166" width="52" height="36" rx="8" fill="#7c2d12" stroke="#fb923c"/>
      <text x="60" y="188" fill="#fed7aa">load</text>
      <rect x="166" y="118" width="56" height="36" rx="8" fill="#7c2d12" stroke="#fb923c"/>
      <text x="194" y="140" fill="#fed7aa">report</text>

      <rect x="220" y="96" width="70" height="40" rx="8" fill="#052e16" stroke="#22c55e"/>
      <text x="255" y="119" fill="#bbf7d0">orders</text>
      <rect x="220" y="184" width="70" height="40" rx="8" fill="#052e16" stroke="#22c55e"/>
      <text x="255" y="207" fill="#bbf7d0">users</text>
      <rect x="300" y="96" width="78" height="40" rx="8" fill="#082f49" stroke="#38bdf8"/>
      <text x="339" y="119" fill="#bae6fd">clean</text>
      <rect x="300" y="184" width="78" height="40" rx="8" fill="#082f49" stroke="#38bdf8"/>
      <text x="339" y="207" fill="#bae6fd">profile</text>
      <rect x="348" y="140" width="70" height="40" rx="8" fill="#3b0764" stroke="#a855f7"/>
      <text x="383" y="163" fill="#e9d5ff">metric</text>
    </g>

    <rect x="42" y="250" width="150" height="34" rx="17" fill="#ffffff" opacity="0.07"/>
    <text x="117" y="271" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#cbd5e1">How work runs</text>
    <rect x="244" y="250" width="150" height="34" rx="17" fill="#ffffff" opacity="0.07"/>
    <text x="319" y="271" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#cbd5e1">What data should exist</text>
  </g>

  <rect y="470" width="1200" height="10" fill="url(#accent)" opacity="0.78"/>
  <text x="80" y="426" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" opacity="0.55">coderssecret.com</text>
</svg>
