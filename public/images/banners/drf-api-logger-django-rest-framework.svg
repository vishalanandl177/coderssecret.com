<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#831843"/>
      <stop offset="50%" style="stop-color:#9f1239"/>
      <stop offset="100%" style="stop-color:#be185d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#fbcfe8"/>
    </linearGradient>
    <pattern id="grid" x="27" y="27" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>

  <!-- Decorative circles (seeded from slug) -->
  <g>
    <circle cx="888" cy="425" r="48" fill="#fbcfe8" opacity="0.051"/>
    <circle cx="233" cy="5" r="66" fill="#fbcfe8" opacity="0.086"/>
    <circle cx="780" cy="419" r="85" fill="#fbcfe8" opacity="0.043"/>
    <circle cx="359" cy="357" r="137" fill="#f472b6" opacity="0.075"/>
  </g>

  <!-- Category badge -->
  <rect x="80" y="90" width="150" height="30" rx="15" fill="url(#accent)" opacity="0.2"/>
  <text x="100" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#f472b6" letter-spacing="2">OPEN SOURCE</text>

  <!-- Title -->
  <text x="80" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">DRF API Logger: Effortless</text>
    <text x="80" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">API Logging for Django REST</text>
    <text x="80" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Framework</text>

  <!-- Bottom brand -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" opacity="0.5">coderssecret.com</text>

  <!-- Icon (right side) -->
  <g transform="translate(1020, 200)" stroke="#f472b6" opacity="0.9" color="#f472b6">
    <circle cx="10" cy="10" r="5" fill="none" stroke-width="3"/><circle cx="10" cy="45" r="5" fill="none" stroke-width="3"/><circle cx="45" cy="28" r="5" fill="none" stroke-width="3"/><path d="M10,15 L10,40" stroke-width="3"/><path d="M10,15 C10,22 25,24 40,26" fill="none" stroke-width="3"/>
  </g>

  <!-- Bottom accent bar -->
  <rect y="470" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
