<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="50%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <pattern id="grid" x="20" y="20" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(3)">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>

  <!-- Decorative circles (seeded from slug) -->
  <g>
    <circle cx="428" cy="225" r="123" fill="#34d399" opacity="0.048"/>
    <circle cx="277" cy="399" r="156" fill="#6ee7b7" opacity="0.085"/>
    <circle cx="253" cy="396" r="48" fill="#34d399" opacity="0.046"/>
  </g>

  <!-- Category badge -->
  <rect x="80" y="90" width="110" height="30" rx="15" fill="url(#accent)" opacity="0.2"/>
  <text x="100" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#34d399" letter-spacing="2">BACKEND</text>

  <!-- Title -->
  <text x="80" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Python Threading vs</text>
    <text x="80" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Multiprocessing: A</text>
    <text x="80" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Beginner-Friendly Deep Dive</text>

  <!-- Bottom brand -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" opacity="0.5">coderssecret.com</text>

  <!-- Icon (right side) -->
  <g transform="translate(1020, 200)" stroke="#34d399" opacity="0.9" color="#34d399">
    <rect x="0" y="0" width="60" height="18" rx="3" fill="none" stroke-width="3"/><rect x="0" y="25" width="60" height="18" rx="3" fill="none" stroke-width="3"/><circle cx="12" cy="9" r="2.5" fill="currentColor"/><circle cx="12" cy="34" r="2.5" fill="currentColor"/>
  </g>

  <!-- Bottom accent bar -->
  <rect y="470" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
