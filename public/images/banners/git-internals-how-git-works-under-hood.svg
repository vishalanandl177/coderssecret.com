<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#581c87"/>
      <stop offset="50%" style="stop-color:#6b21a8"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#e9d5ff"/>
    </linearGradient>
    <pattern id="grid" x="18" y="18" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>

  <!-- Decorative circles (seeded from slug) -->
  <g>
    <circle cx="299" cy="327" r="122" fill="#e9d5ff" opacity="0.076"/>
    <circle cx="1101" cy="10" r="68" fill="#e9d5ff" opacity="0.041"/>
    <circle cx="851" cy="391" r="140" fill="#c084fc" opacity="0.049"/>
  </g>

  <!-- Category badge -->
  <rect x="80" y="90" width="120" height="30" rx="15" fill="url(#accent)" opacity="0.2"/>
  <text x="100" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#c084fc" letter-spacing="2">TUTORIAL</text>

  <!-- Title -->
  <text x="80" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Git Internals: How Git</text>
    <text x="80" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Actually Works Under the</text>
    <text x="80" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Hood</text>

  <!-- Bottom brand -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" opacity="0.5">coderssecret.com</text>

  <!-- Icon (right side) -->
  <g transform="translate(1020, 200)" stroke="#c084fc" opacity="0.9" color="#c084fc">
    <path d="M0,6 C0,2 4,0 10,0 L30,0 C36,0 40,2 40,6 L40,50 C40,48 36,46 30,46 L10,46 C4,46 0,48 0,50 Z" fill="none" stroke-width="3"/><line x1="40" y1="6" x2="40" y2="50" stroke-width="3"/>
  </g>

  <!-- Bottom accent bar -->
  <rect y="470" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
