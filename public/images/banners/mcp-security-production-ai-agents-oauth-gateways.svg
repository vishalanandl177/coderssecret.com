<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="45%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#ffffff" stroke-width="0.7" opacity="0.08"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <circle cx="955" cy="135" r="150" fill="#22d3ee" opacity="0.12"/>
  <circle cx="1065" cy="360" r="120" fill="#34d399" opacity="0.10"/>
  <circle cx="720" cy="420" r="180" fill="#a78bfa" opacity="0.10"/>

  <rect x="80" y="82" width="60" height="30" rx="15" fill="url(#accent)" opacity="0.22"/>
  <text x="100" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#67e8f9" letter-spacing="2">AI</text>

  <text x="80" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="850" fill="#ffffff">MCP Security in Production</text>
  <text x="80" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="850" fill="#ffffff">OAuth, Tools, and Gateways</text>
  <text x="82" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="19" font-weight="500" fill="#d1d5db">Secure AI agents before they touch real systems</text>

  <g transform="translate(788 130)" filter="url(#glow)">
    <rect x="0" y="70" width="125" height="72" rx="16" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <text x="62" y="101" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#e0f2fe">AI Client</text>
    <text x="62" y="123" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8">agent host</text>

    <rect x="190" y="42" width="150" height="128" rx="20" fill="#111827" stroke="#a78bfa" stroke-width="3"/>
    <text x="265" y="86" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="850" fill="#ede9fe">MCP</text>
    <text x="265" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="850" fill="#ede9fe">Gateway</text>
    <text x="265" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c4b5fd">policy + audit</text>

    <rect x="410" y="0" width="135" height="58" rx="14" fill="#052e16" stroke="#34d399" stroke-width="2"/>
    <text x="478" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#bbf7d0">MCP Server</text>
    <rect x="410" y="82" width="135" height="58" rx="14" fill="#052e16" stroke="#34d399" stroke-width="2"/>
    <text x="478" y="117" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#bbf7d0">Tools</text>
    <rect x="410" y="164" width="135" height="58" rx="14" fill="#052e16" stroke="#34d399" stroke-width="2"/>
    <text x="478" y="199" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#bbf7d0">APIs</text>

    <path d="M125 106 H190" stroke="#e0f2fe" stroke-width="3" stroke-linecap="round"/>
    <path d="M340 106 H398" stroke="#e0f2fe" stroke-width="3" stroke-linecap="round"/>
    <path d="M398 106 C385 38 398 30 410 30" stroke="#e0f2fe" stroke-width="2" opacity="0.7"/>
    <path d="M398 106 H410" stroke="#e0f2fe" stroke-width="2" opacity="0.7"/>
    <path d="M398 106 C385 176 398 194 410 194" stroke="#e0f2fe" stroke-width="2" opacity="0.7"/>
  </g>

  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" opacity="0.55">coderssecret.com</text>
  <rect y="470" width="1200" height="10" fill="url(#accent)" opacity="0.8"/>
</svg>
