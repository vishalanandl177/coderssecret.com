<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Centralized Authentication and Authorization with Envoy course banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141218"/>
      <stop offset="58%" stop-color="#211F26"/>
      <stop offset="100%" stop-color="#003737"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F378B"/>
      <stop offset="100%" stop-color="#004F4F"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6FF7F5"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="56" y="56" width="1088" height="518" rx="44" fill="#211F26" stroke="#49454F" stroke-width="2"/>
  <text x="100" y="132" fill="#6FF7F5" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" letter-spacing="2">CODERSSECRET COURSE</text>
  <text x="100" y="210" fill="#E6E0E9" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900">Centralized Auth</text>
  <text x="100" y="276" fill="#D0BCFF" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900">with Plain Envoy</text>
  <text x="100" y="334" fill="#CAC4D0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">SSO, JWT/JWKS, service tokens, federated credentials,</text>
  <text x="100" y="370" fill="#CAC4D0" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">authorization policy, headers, audits, and production scale.</text>

  <rect x="112" y="436" width="154" height="48" rx="24" fill="#EADDFF"/>
  <text x="189" y="467" text-anchor="middle" fill="#4B287B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Beginner</text>
  <rect x="284" y="436" width="202" height="48" rx="24" fill="#6FF7F5"/>
  <text x="385" y="467" text-anchor="middle" fill="#003737" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Production grade</text>
  <rect x="504" y="436" width="116" height="48" rx="24" fill="#FFD8E4"/>
  <text x="562" y="467" text-anchor="middle" fill="#633B48" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Free</text>

  <g transform="translate(690 142)">
    <rect x="0" y="0" width="380" height="340" rx="36" fill="url(#panel)" stroke="#D0BCFF" stroke-width="2"/>
    <rect x="44" y="62" width="94" height="68" rx="24" fill="#EADDFF"/>
    <text x="91" y="103" text-anchor="middle" fill="#4B287B" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="900">USER</text>
    <rect x="144" y="142" width="94" height="74" rx="26" fill="#006A6A" stroke="#6FF7F5" stroke-width="3"/>
    <text x="191" y="174" text-anchor="middle" fill="#E5FFFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">ENVOY</text>
    <text x="191" y="196" text-anchor="middle" fill="#C9FFFF" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">policy</text>
    <rect x="244" y="62" width="94" height="68" rx="24" fill="#3D3346" stroke="#D0BCFF" stroke-width="2"/>
    <text x="291" y="94" text-anchor="middle" fill="#F5ECFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">IDP</text>
    <text x="291" y="113" text-anchor="middle" fill="#CAC4D0" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">SSO</text>
    <rect x="244" y="234" width="94" height="68" rx="24" fill="#FFD8E4"/>
    <text x="291" y="276" text-anchor="middle" fill="#633B48" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">APPS</text>
    <path d="M138 96 C176 96 166 142 184 142" fill="none" stroke="#6FF7F5" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M238 174 C272 174 286 140 290 130" fill="none" stroke="#6FF7F5" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M238 192 C274 212 286 232 290 234" fill="none" stroke="#6FF7F5" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M291 130 C244 176 240 214 291 234" fill="none" stroke="#D0BCFF" stroke-width="3" stroke-dasharray="8 8"/>
    <text x="190" y="322" text-anchor="middle" fill="#E6E0E9" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">VALIDATE -> AUTHORIZE -> FORWARD</text>
  </g>
</svg>
