<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <pattern id="grid" x="8" y="8" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(14)">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>

  <!-- Decorative circles (seeded from slug) -->
  <g>
    <circle cx="714" cy="404" r="92" fill="#60a5fa" opacity="0.075"/>
    <circle cx="378" cy="216" r="125" fill="#a78bfa" opacity="0.060"/>
    <circle cx="200" cy="206" r="61" fill="#a78bfa" opacity="0.082"/>
    <circle cx="880" cy="170" r="145" fill="#60a5fa" opacity="0.066"/>
    <circle cx="841" cy="80" r="147" fill="#a78bfa" opacity="0.076"/>
  </g>

  <!-- Category badge -->
  <rect x="80" y="90" width="120" height="30" rx="15" fill="url(#accent)" opacity="0.2"/>
  <text x="100" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#60a5fa" letter-spacing="2">FRONTEND</text>

  <!-- Title -->
  <text x="80" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Building Your Own Design</text>
    <text x="80" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">System: The Complete</text>
    <text x="80" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Practical Guide</text>

  <!-- Bottom brand -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" opacity="0.5">coderssecret.com</text>

  <!-- Icon (right side) -->
  <g transform="translate(1020, 200)" stroke="#60a5fa" opacity="0.9" color="#60a5fa">
    <rect x="0" y="0" width="60" height="42" rx="4" fill="none" stroke-width="3"/><line x1="20" y1="50" x2="40" y2="50" stroke-width="3"/><line x1="30" y1="42" x2="30" y2="50" stroke-width="3"/>
  </g>

  <!-- Bottom accent bar -->
  <rect y="470" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
