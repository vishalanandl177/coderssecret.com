<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12"/>
      <stop offset="50%" style="stop-color:#9a3412"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#fdba74"/>
    </linearGradient>
    <pattern id="grid" x="36" y="36" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>

  <!-- Decorative circles (seeded from slug) -->
  <g>
    <circle cx="1188" cy="42" r="92" fill="#fb923c" opacity="0.058"/>
    <circle cx="1102" cy="208" r="112" fill="#fdba74" opacity="0.041"/>
    <circle cx="409" cy="423" r="125" fill="#fb923c" opacity="0.044"/>
    <circle cx="15" cy="448" r="66" fill="#fdba74" opacity="0.063"/>
  </g>

  <!-- Category badge -->
  <rect x="80" y="90" width="100" height="30" rx="15" fill="url(#accent)" opacity="0.2"/>
  <text x="100" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="800" fill="#fb923c" letter-spacing="2">DEVOPS</text>

  <!-- Title -->
  <text x="80" y="184" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Kubernetes Networking Made</text>
    <text x="80" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Simple: Services, Ingress,</text>
    <text x="80" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#ffffff">and Load Balancers Explained</text>

  <!-- Bottom brand -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#ffffff" opacity="0.5">coderssecret.com</text>

  <!-- Icon (right side) -->
  <g transform="translate(1020, 200)" stroke="#fb923c" opacity="0.9" color="#fb923c">
    <polygon points="30,0 60,15 30,30 0,15" fill="none" stroke-width="3"/><polyline points="0,30 30,45 60,30" fill="none" stroke-width="3"/>
  </g>

  <!-- Bottom accent bar -->
  <rect y="470" width="1200" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
