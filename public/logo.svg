<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="code-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg-grad)"/>
  <!-- Code brackets: < / > -->
  <g stroke="url(#code-grad)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left bracket < -->
    <polyline points="180,170 100,256 180,342"/>
    <!-- Right bracket > -->
    <polyline points="332,170 412,256 332,342"/>
    <!-- Forward slash / -->
    <line x1="290" y1="148" x2="222" y2="364"/>
  </g>
  <!-- CS text -->
  <text x="256" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="rgba(255,255,255,0.9)" letter-spacing="8">CS</text>
</svg>
