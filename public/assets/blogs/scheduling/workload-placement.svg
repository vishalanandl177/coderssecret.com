<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" role="img" aria-label="Workload placement comparison: pack vs spread across nodes">
  <rect width="800" height="360" fill="#0f172a" rx="12"/>
  <text x="400" y="32" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">WORKLOAD PLACEMENT — PACK vs SPREAD</text>
  <text x="200" y="68" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">PACK (MostAllocated, FFD)</text>
  <rect x="60" y="100" width="80" height="180" rx="6" fill="none" stroke="#fbbf24"/>
  <text x="100" y="296" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700">Node A</text>
  <rect x="65" y="120" width="70" height="40" fill="#fbbf24" fill-opacity="0.5"/>
  <rect x="65" y="165" width="70" height="40" fill="#fbbf24" fill-opacity="0.5"/>
  <rect x="65" y="210" width="70" height="40" fill="#fbbf24" fill-opacity="0.5"/>
  <text x="100" y="270" text-anchor="middle" fill="#94a3b8" font-size="8">95% util</text>
  <rect x="160" y="100" width="80" height="180" rx="6" fill="none" stroke="#fbbf24"/>
  <text x="200" y="296" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700">Node B</text>
  <rect x="165" y="120" width="70" height="60" fill="#fbbf24" fill-opacity="0.5"/>
  <rect x="165" y="185" width="70" height="40" fill="#fbbf24" fill-opacity="0.5"/>
  <text x="200" y="270" text-anchor="middle" fill="#94a3b8" font-size="8">82% util</text>
  <rect x="260" y="100" width="80" height="180" rx="6" fill="none" stroke="#475569" stroke-dasharray="3 3"/>
  <text x="300" y="296" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700">Node C</text>
  <text x="300" y="195" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="700">EMPTY</text>
  <text x="300" y="215" text-anchor="middle" fill="#86efac" font-size="9">scale down</text>
  <text x="600" y="68" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">SPREAD (LeastAllocated)</text>
  <rect x="460" y="100" width="80" height="180" rx="6" fill="none" stroke="#86efac"/>
  <rect x="465" y="200" width="70" height="40" fill="#22c55e" fill-opacity="0.5"/>
  <text x="500" y="270" text-anchor="middle" fill="#94a3b8" font-size="8">42% util</text>
  <rect x="560" y="100" width="80" height="180" rx="6" fill="none" stroke="#86efac"/>
  <rect x="565" y="180" width="70" height="60" fill="#22c55e" fill-opacity="0.5"/>
  <text x="600" y="270" text-anchor="middle" fill="#94a3b8" font-size="8">55% util</text>
  <rect x="660" y="100" width="80" height="180" rx="6" fill="none" stroke="#86efac"/>
  <rect x="665" y="160" width="70" height="40" fill="#22c55e" fill-opacity="0.5"/>
  <rect x="665" y="205" width="70" height="40" fill="#22c55e" fill-opacity="0.5"/>
  <text x="700" y="270" text-anchor="middle" fill="#94a3b8" font-size="8">63% util</text>
</svg>
