<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="Multi-region cache architecture with CDC pipeline">
  <rect width="800" height="380" fill="#0f172a" rx="12"/>
