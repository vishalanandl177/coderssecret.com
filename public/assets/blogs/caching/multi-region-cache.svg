  <text x="400" y="220" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700">Debezium CDC events</text>
  <text x="400" y="260" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700">Invalidator per region</text>
  <text x="400" y="295" text-anchor="middle" fill="#94a3b8" font-size="9">~100–500ms eventual</text>
