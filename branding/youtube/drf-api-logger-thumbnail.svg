<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050509"/>
      <stop offset="0.52" stop-color="#101827"/>
      <stop offset="1" stop-color="#061021"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.52" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.55" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="180" cy="130" r="260" fill="url(#purpleGlow)"/>
  <circle cx="1110" cy="610" r="300" fill="url(#blueGlow)"/>

  <g transform="translate(74 58)" filter="url(#shadow)">
    <rect width="68" height="68" rx="16" fill="url(#brand)"/>
    <g stroke="#fff" stroke-width="5.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <polyline points="24 21 12 34 24 47"/>
      <polyline points="44 21 56 34 44 47"/>
      <line x1="39" y1="17" x2="29" y2="51"/>
    </g>
  </g>
  <text x="158" y="104" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="900">
    <tspan fill="#ffffff">Coders</tspan><tspan fill="#9ca3af">Secret</tspan>
  </text>

  <g transform="translate(72 170)">
    <text x="0" y="0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="68" font-weight="950" letter-spacing="-1.8" fill="#ffffff">
      DRF API Logger
    </text>
    <text x="0" y="82" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="48" font-weight="900" letter-spacing="-1" fill="#cbd5e1">
      Production API Logging
    </text>
    <rect x="0" y="122" width="530" height="8" rx="4" fill="url(#accent)"/>
  </g>

  <g transform="translate(72 382)">
    <rect x="0" y="0" width="510" height="78" rx="18" fill="#111827" fill-opacity="0.86" stroke="#334155"/>
    <text x="34" y="50" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="31" font-weight="850" fill="#93c5fd">pip install drf-api-logger</text>
    <rect x="0" y="102" width="394" height="64" rx="32" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.44"/>
    <text x="28" y="144" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="900" fill="#86efac">Install / Configure / Inspect</text>
  </g>

  <g transform="translate(704 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="488" height="402" rx="24" fill="#0f172a" fill-opacity="0.88" stroke="#334155"/>
    <rect x="0" y="0" width="488" height="62" rx="24" fill="#1e293b"/>
    <circle cx="34" cy="31" r="8" fill="#ef4444"/>
    <circle cx="62" cy="31" r="8" fill="#f97316"/>
    <circle cx="90" cy="31" r="8" fill="#22c55e"/>
    <text x="128" y="40" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="850" fill="#e2e8f0">Django Admin Logs</text>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="800">
      <rect x="28" y="92" width="432" height="54" rx="10" fill="#111827"/>
      <text x="48" y="127" fill="#60a5fa">POST</text>
      <text x="132" y="127" fill="#f8fafc">/api/orders/</text>
      <text x="346" y="127" fill="#22c55e">201</text>
      <text x="398" y="127" fill="#94a3b8">132ms</text>

      <rect x="28" y="164" width="432" height="54" rx="10" fill="#111827"/>
      <text x="48" y="199" fill="#60a5fa">GET</text>
      <text x="132" y="199" fill="#f8fafc">/api/users/</text>
      <text x="346" y="199" fill="#22c55e">200</text>
      <text x="408" y="199" fill="#94a3b8">48ms</text>

      <rect x="28" y="236" width="432" height="54" rx="10" fill="#3b1d1d"/>
      <text x="48" y="271" fill="#60a5fa">POST</text>
      <text x="132" y="271" fill="#f8fafc">/api/login/</text>
      <text x="346" y="271" fill="#fb7185">401</text>
      <text x="406" y="271" fill="#fbbf24">96ms</text>

      <rect x="28" y="308" width="432" height="54" rx="10" fill="#281b12"/>
      <text x="48" y="343" fill="#60a5fa">GET</text>
      <text x="132" y="343" fill="#f8fafc">/api/reports/</text>
      <text x="346" y="343" fill="#22c55e">200</text>
      <text x="398" y="343" fill="#f97316">812ms</text>
    </g>
  </g>

  <g transform="translate(762 542)">
    <rect x="0" y="0" width="360" height="66" rx="33" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="180" y="43" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="26" font-weight="900" fill="#ffffff">Django REST Framework</text>
  </g>
</svg>
